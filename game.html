<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐱 Billu's Kitchen</title>
  <link rel="stylesheet" href="game.css"/>
</head>
<body>

  <h1>🐱 Billu's Kitchen</h1>
  <p class="subtitle">a cozy Pakistani kitchen run by one very talented cat</p>

  <!-- Fact bubble -->
  <div class="fact-banner" id="factBanner">
    <div class="bubble-tail"></div>
    <span class="fact-icon">💬</span>
    <span id="factText">Welcome! Pick a dish to start cooking...</span>
  </div>

  <div class="kitchen">

    <!-- SVG Kitchen Background -->
    <svg class="kitchen-bg" viewBox="0 0 400 180" xmlns="http://www.w3.org/2000/svg">

      <!-- Wall -->
      <rect width="400" height="180" fill="#fde8c0" rx="16"/>

      <!-- Window -->
      <rect x="150" y="10" width="100" height="70" fill="#c9e8f5" rx="8" stroke="#b0785a" stroke-width="3"/>
      <line x1="200" y1="10" x2="200" y2="80" stroke="#b0785a" stroke-width="2"/>
      <line x1="150" y1="45" x2="250" y2="45" stroke="#b0785a" stroke-width="2"/>
      <!-- Curtains -->
      <path d="M150,10 Q135,45 150,80" fill="#e8a0a0" opacity="0.7"/>
      <path d="M250,10 Q265,45 250,80" fill="#e8a0a0" opacity="0.7"/>
      <!-- Sun through window -->
      <circle cx="200" cy="35" r="14" fill="#f9d74b" opacity="0.6"/>

      <!-- Counter top -->
      <rect x="0" y="130" width="400" height="50" fill="#c8956a" rx="4"/>
      <rect x="0" y="128" width="400" height="8" fill="#b07050" rx="2"/>

      <!-- Stove -->
      <rect x="60" y="90" width="120" height="50" fill="#888" rx="8"/>
      <rect x="60" y="90" width="120" height="14" fill="#aaa" rx="8"/>
      <!-- Burner -->
      <ellipse cx="120" cy="100" rx="22" ry="8" fill="#555"/>
      <ellipse cx="120" cy="100" rx="14" ry="5" fill="#333"/>
      <!-- Flame (animated in CSS) -->
      <ellipse cx="120" cy="97" rx="7" ry="5" fill="#ff6b00" class="flame" opacity="0.9"/>
      <ellipse cx="120" cy="96" rx="4" ry="3" fill="#ffcc00" class="flame-inner"/>

      <!-- Shelf on wall -->
      <rect x="290" y="30" width="90" height="8" fill="#b07050" rx="3"/>
      <rect x="292" y="4" width="6" height="28" fill="#b07050" rx="2"/>
      <rect x="370" y="4" width="6" height="28" fill="#b07050" rx="2"/>
      <!-- Shelf items -->
      <rect x="298" y="14" width="16" height="18" fill="#e07b39" rx="3"/>
      <rect x="318" y="18" width="12" height="14" fill="#7b9e4a" rx="3"/>
      <rect x="334" y="12" width="14" height="20" fill="#c04a2a" rx="3"/>
      <ellipse cx="306" cy="14" rx="5" ry="3" fill="#c05010"/>
      <ellipse cx="324" cy="18" rx="4" ry="2.5" fill="#5a7e3a"/>
      <ellipse cx="341" cy="12" rx="5" ry="3" fill="#902010"/>

      <!-- Tiles on wall -->
      <rect x="0" y="80" width="60" height="50" fill="#f5dfc0" opacity="0.5"/>
      <line x1="20" y1="80" x2="20" y2="130" stroke="#e8c090" stroke-width="1"/>
      <line x1="40" y1="80" x2="40" y2="130" stroke="#e8c090" stroke-width="1"/>
      <line x1="0" y1="100" x2="60" y2="100" stroke="#e8c090" stroke-width="1"/>
      <line x1="0" y1="120" x2="60" y2="120" stroke="#e8c090" stroke-width="1"/>

      <!-- Hanging spice bundles -->
      <line x1="330" y1="90" x2="330" y2="115" stroke="#8b6040" stroke-width="1.5"/>
      <ellipse cx="330" cy="118" rx="8" ry="5" fill="#7b9e4a" opacity="0.8"/>
      <line x1="355" y1="90" x2="355" y2="110" stroke="#8b6040" stroke-width="1.5"/>
      <ellipse cx="355" cy="113" rx="6" ry="4" fill="#c04a2a" opacity="0.8"/>

    </svg>

    <!-- Cat SVG character -->
    <div class="cat-wrapper" id="catWrapper">
      <svg class="cat-svg" id="catSvg" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
        <!-- Body -->
        <ellipse cx="50" cy="80" rx="28" ry="24" fill="#f5a842"/>
        <!-- Head -->
        <circle cx="50" cy="48" r="26" fill="#f5a842"/>
        <!-- Ears -->
        <polygon points="28,28 20,8 38,20" fill="#f5a842"/>
        <polygon points="72,28 80,8 62,20" fill="#f5a842"/>
        <polygon points="29,26 23,12 37,21" fill="#f9c070"/>
        <polygon points="71,26 77,12 63,21" fill="#f9c070"/>
        <!-- Face -->
        <circle cx="42" cy="46" r="5" fill="white"/>
        <circle cx="58" cy="46" r="5" fill="white"/>
        <circle cx="43" cy="47" r="3" fill="#2a1a0a" id="eyeL"/>
        <circle cx="59" cy="47" r="3" fill="#2a1a0a" id="eyeR"/>
        <!-- Eye shine -->
        <circle cx="44" cy="46" r="1" fill="white"/>
        <circle cx="60" cy="46" r="1" fill="white"/>
        <!-- Nose -->
        <ellipse cx="50" cy="54" rx="3" ry="2" fill="#e06080"/>
        <!-- Mouth -->
        <path d="M46,56 Q50,60 54,56" fill="none" stroke="#c04060" stroke-width="1.5" stroke-linecap="round"/>
        <!-- Whiskers -->
        <line x1="20" y1="52" x2="44" y2="54" stroke="#8b6040" stroke-width="1" opacity="0.6"/>
        <line x1="20" y1="56" x2="44" y2="56" stroke="#8b6040" stroke-width="1" opacity="0.6"/>
        <line x1="56" y1="54" x2="80" y2="52" stroke="#8b6040" stroke-width="1" opacity="0.6"/>
        <line x1="56" y1="56" x2="80" y2="56" stroke="#8b6040" stroke-width="1" opacity="0.6"/>
        <!-- Tail -->
        <path d="M78,90 Q100,80 95,65 Q90,55 82,70" fill="none" stroke="#f5a842" stroke-width="8" stroke-linecap="round"/>
        <!-- Apron -->
        <ellipse cx="50" cy="82" rx="20" ry="16" fill="white" opacity="0.7"/>
        <text x="50" y="86" text-anchor="middle" font-size="14">🍳</text>
        <!-- Arm with spoon -->
        <line x1="22" y1="78" x2="10" y2="95" stroke="#f5a842" stroke-width="7" stroke-linecap="round" id="catArm"/>
        <text x="2" y="102" font-size="14" id="spoon">🥄</text>
      </svg>
    </div>

    <!-- Cat speech -->
    <div class="cat-msg" id="catMsg">Assalam o Alaikum! What are we making today?</div>

    <!-- Pot SVG -->
    <div class="pot-wrapper" id="potWrapper">
      <svg class="pot-svg" viewBox="0 0 140 110" xmlns="http://www.w3.org/2000/svg">
        <!-- Handles -->
        <rect x="8" y="38" width="16" height="10" fill="#7a3500" rx="3"/>
        <rect x="116" y="38" width="16" height="10" fill="#7a3500" rx="3"/>
        <!-- Pot body -->
        <path d="M24,40 Q24,95 70,95 Q116,95 116,40 Z" fill="#8b4513"/>
        <path d="M24,40 Q24,95 70,95 Q116,95 116,40 Z" fill="url(#potShine)"/>
        <!-- Liquid fill (changes with progress) -->
        <clipPath id="potClip">
          <path d="M24,40 Q24,95 70,95 Q116,95 116,40 Z"/>
        </clipPath>
        <rect x="24" y="40" width="92" height="55" fill="#c8501a" opacity="0.3" clip-path="url(#potClip)" id="potFillBg"/>
        <rect x="24" id="potFill" y="95" width="92" height="0" fill="#c8501a" opacity="0.7" clip-path="url(#potClip)"/>
        <!-- Rim -->
        <ellipse cx="70" cy="40" rx="46" ry="10" fill="#a05010"/>
        <!-- Lid -->
        <ellipse cx="70" cy="32" rx="46" ry="10" fill="#8b4513" id="lid"/>
        <ellipse cx="70" cy="30" rx="46" ry="10" fill="#a05010" id="lidTop"/>
        <ellipse cx="70" cy="28" rx="12" ry="5" fill="#7a3500" id="lidKnob"/>
        <!-- Shine -->
        <defs>
          <linearGradient id="potShine" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
            <stop offset="40%" stop-color="white" stop-opacity="0"/>
            <stop offset="100%" stop-color="black" stop-opacity="0.1"/>
          </linearGradient>
        </defs>
        <!-- Steam lines (animated) -->
        <path class="steam" d="M55,22 Q52,14 55,6" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
        <path class="steam" d="M70,20 Q67,10 70,2" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
        <path class="steam" d="M85,22 Q82,14 85,6" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
      </svg>
      <div class="pot-contents" id="potContents"></div>
    </div>

    <!-- Ingredient working area -->
    <div class="ing-area" id="ingArea" style="display:none">
      <div class="ing-display" id="ingDisplay">
        <div class="ing-emoji" id="ingEmoji"></div>
        <div class="ing-name" id="ingName"></div>
        <div class="chop-marks" id="chopMarks"></div>
      </div>
      <div class="ing-actions">
        <button class="step-btn cut-btn" id="cutBtn" onclick="cutIngredient()">🔪 Cut</button>
        <button class="step-btn toss-btn" id="tossBtn" onclick="tossIngredient()" disabled>🤲 Toss in</button>
        <button class="step-btn stir-btn" id="stirBtn" onclick="stirPot()" disabled>🥄 Stir</button>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-label" id="progressLabel"></div>
    </div>

    <!-- Dish selector -->
    <div class="dish-select" id="dishSelect">
      <p class="section-label">choose a dish 👇</p>
      <div class="dish-grid">
        <button class="dish-btn" onclick="startDish('biryani')">🍚 Biryani</button>
        <button class="dish-btn" onclick="startDish('nihari')">🍖 Nihari</button>
        <button class="dish-btn" onclick="startDish('halwapuri')">🫓 Halwa Puri</button>
        <button class="dish-btn" onclick="startDish('karahi')">🥘 Karahi</button>
        <button class="dish-btn" onclick="startDish('bhindi')">🫑 Bhindi Fry</button>
        <button class="dish-btn" onclick="startDish('mandi')">🍗 Mandi</button>
      </div>
    </div>

    <button class="serve-btn" id="serveBtn" onclick="serveDish()" style="display:none">
      🍽️ Serve the dish!
    </button>

    <div class="score">dishes served: <strong id="count">0</strong></div>

  </div>
  <!-- Cutting board scene -->
<div class="cutting-scene" id="cuttingScene" style="display:none">
  <div class="board-label" id="boardLabel">slice across the ingredient!</div>
  <div class="canvas-wrapper">
    <canvas id="cuttingCanvas" width="300" height="180"></canvas>
  </div>
  <div class="cut-status" id="cutStatus">✂️ ✂️ ✂️</div>
  <button class="step-btn toss-btn" id="tossBtn" onclick="tossIngredient()" style="display:none">
    🤲 Toss in pot
  </button>
</div>

  <script src="game.js"></script>
</body>
</html>
